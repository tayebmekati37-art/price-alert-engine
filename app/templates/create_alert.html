{% extends "base.html" %}

{% block content %}
<h2>Create New Price Alert</h2>
<form method="POST">
    <div class="mb-3">
        <label for="asset_symbol" class="form-label">Asset Symbol</label>
        <input type="text" class="form-control" id="asset_symbol" name="asset_symbol" placeholder="e.g., BTC, ETH, AAPL, MSFT" required>
    </div>
    <div class="mb-3">
        <label for="asset_type" class="form-label">Asset Type</label>
        <select class="form-select" id="asset_type" name="asset_type" required>
            <option value="crypto">Cryptocurrency (CoinGecko)</option>
            <option value="stock">Stock (Yahoo Finance)</option>
        </select>
        <div class="form-text">For crypto, use CoinGecko IDs (e.g., bitcoin, ethereum). For stocks, use ticker symbol (e.g., AAPL).</div>
    </div>
    <div class="mb-3">
        <label for="condition" class="form-label">Condition</label>
        <select class="form-select" id="condition" name="condition" required>
            <option value=">">Greater than (>)</option>
            <option value="<">Less than (<)</option>
            <option value="%">Percentage change (experimental)</option>
        </select>
    </div>
    <div class="mb-3">
        <label for="threshold" class="form-label">Threshold (USD or %)</label>
        <input type="number" step="0.01" class="form-control" id="threshold" name="threshold" required>
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" required>
    </div>
    <button type="submit" class="btn btn-primary">Create Alert</button>
    <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
